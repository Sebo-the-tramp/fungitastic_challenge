<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Experiment Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 16px;
      color: #111;
      background: #fff;
      font: 14px/1.4 sans-serif;
    }

    main {
      max-width: 100%;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 18px;
      display: inline-block;
      padding: 6px 10px;
      border: 3px solid #111;
    }

    p {
      margin: 0 0 12px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 3px solid #111;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 6px 8px;
      border: 1px solid #ddd;
      text-align: left;
      white-space: nowrap;
    }

    th {
      font-weight: 600;
      background: #fff;
    }

    .group-start td {
      border-top: 2px solid #111;
    }

    .status {
      text-transform: lowercase;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .mono {
      font-family: monospace;
    }

    .muted {
      color: #777;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Experiment Dashboard</h1>
    <p id="subtitle">Loading...</p>
    <section id="content"></section>
  </main>

  <script>
    const STATUS_EMOJI = {
      todo: "📝",
      doing: "🚧",
      done: "✅",
      blocked: "⛔"
    };

    function splitExpId(expId) {
      const parts = expId.split("_");
      let imageSizeIndex = -1;

      for (let i = parts.length - 1; i >= 0; i -= 1) {
        if (/^\d+$/.test(parts[i])) {
          imageSizeIndex = i;
          break;
        }
      }

      if (imageSizeIndex < 1 || imageSizeIndex === parts.length - 1) {
        return { backbone: expId, backgroundAug: "-", imageSize: "-", method: "-" };
      }

      return {
        backbone: parts.slice(0, imageSizeIndex - 1).join("_"),
        backgroundAug: parts[imageSizeIndex - 1],
        imageSize: parts[imageSizeIndex],
        method: parts.slice(imageSizeIndex + 1).join("_")
      };
    }

    function rowsFromPlan(plan, results) {
      const summaryById = Object.fromEntries(results.experiments.map((experiment) => [experiment.id, experiment]));
      const rows = [];

      for (const experiment of plan.experiments) {
        const summary = summaryById[experiment.id];
        const itemsByName = summary ? Object.fromEntries(summary.items.map((item) => [item.name, item])) : {};

        if (experiment.items && experiment.items.length) {
          for (const item of experiment.items) {
            const itemSummary = itemsByName[item.name];
            const exp = splitExpId(experiment.id);
            rows.push({
              backbone: exp.backbone,
              backgroundAug: exp.backgroundAug,
              imageSize: exp.imageSize,
              method: exp.method,
              groupKey: [exp.backbone, exp.backgroundAug, exp.imageSize, exp.method].join("|"),
              item: item.name,
              reason: item.reason || experiment.reason,
              status: STATUS_EMOJI[itemSummary ? itemSummary.status : item.status] || "?",
              finalAccuracy: itemSummary && itemSummary.best_metrics ? Number(itemSummary.best_metrics.test_acc).toFixed(4) : "-"
            });
          }
          continue;
        }

        const status = !summary || summary.completed_items === 0 ? experiment.status : summary.completed_items === summary.total_items ? "done" : "doing";
        const exp = splitExpId(experiment.id);
        rows.push({
          backbone: exp.backbone,
          backgroundAug: exp.backgroundAug,
          imageSize: exp.imageSize,
          method: exp.method,
          groupKey: [exp.backbone, exp.backgroundAug, exp.imageSize, exp.method].join("|"),
          item: "-",
          reason: experiment.reason,
          status: STATUS_EMOJI[status] || "?",
          finalAccuracy: summary && summary.best ? Number(summary.best.test_acc).toFixed(4) : "-"
        });
      }

      return rows;
    }

    Promise.all([fetch("./experiments.json"), fetch("./results.json")])
      .then(async ([planResponse, resultsResponse]) => [await planResponse.json(), await resultsResponse.json()])
      .then(([plan, results]) => {
        const rows = rowsFromPlan(plan, results);
        const bestAccuracy = results.overview.best_test_acc === null ? "-" : Number(results.overview.best_test_acc).toFixed(4);
        document.getElementById("title").textContent = plan.title;
        document.getElementById("subtitle").textContent = plan.subtitle;
        document.getElementById("content").innerHTML = `
          <p><strong>planned</strong> ${results.overview.planned_items} | <strong>done</strong> ${results.overview.completed_items} | <strong>remaining</strong> ${results.overview.remaining_items} | <strong>best</strong> ${bestAccuracy}</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>backbone</th>
                  <th>aug</th>
                  <th>image_size</th>
                  <th>method</th>
                  <th>item</th>
                  <th>reason</th>
                  <th>status</th>
                  <th>final_accuracy</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((row, index) => `
                  <tr class="${index > 0 && row.groupKey !== rows[index - 1].groupKey ? "group-start" : ""}">
                    <td class="mono">${row.backbone}</td>
                    <td class="mono">${row.backgroundAug}</td>
                    <td class="num">${row.imageSize}</td>
                    <td class="mono">${row.method}</td>
                    <td class="mono">${row.item}</td>
                    <td>${row.reason}</td>
                    <td class="status">${row.status}</td>
                    <td class="num">${row.finalAccuracy}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      })
      .catch(() => {
        document.getElementById("subtitle").textContent = "Failed to load dashboard data";
        document.getElementById("content").innerHTML = '<p>Run <code>./run.sh</code> and open <a href="http://127.0.0.1:8000">http://127.0.0.1:8000</a>.</p>';
      });
  </script>
</body>
</html>
